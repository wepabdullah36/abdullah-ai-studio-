<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Abdullah AI Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c1b;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
        }
        .auth-input {
            width: 100%;
            padding: 14px 20px;
            margin: 10px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: #fff;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }
        .auth-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-link a {
            color: #00e5ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-container glass">
        <div class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i> Abdullah AI</div>
        <h2 style="margin-bottom: 20px;">Welcome Back</h2>
        
        <form id="loginForm">
            <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html'; // لاگ ان کے بعد ڈیش بورڈ پر بھیجیں
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            }
        });
    </script>
</body>
</html>
